services:
  db:
    image: pgvector/pgvector:pg16
    container_name: reviewlens-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reviewlens
      POSTGRES_PASSWORD: reviewlens
      POSTGRES_DB: reviewlens
    ports:
      - "5432:5432"
    volumes:
      - reviewlens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewlens -d reviewlens"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  reviewlens_pgdata:
